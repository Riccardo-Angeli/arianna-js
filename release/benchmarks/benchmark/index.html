<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AriannA — js-framework-benchmark</title>
  <link href="/css/currentStyle.css" rel="stylesheet">
</head>
<body>
  <div id="main">
    <div class="jumbotron"><div class="row">
      <div class="col-md-6"><h1>AriannA v1.0.0</h1></div>
      <div class="col-md-6">
        <div class="row">
          <div class="col-sm-6 smallpadding"><button class="btn btn-primary btn-block" type="button" id="run"        onclick="run()">Create 1,000 rows</button></div>
          <div class="col-sm-6 smallpadding"><button class="btn btn-primary btn-block" type="button" id="runlots"    onclick="runLots()">Create 10,000 rows</button></div>
          <div class="col-sm-6 smallpadding"><button class="btn btn-primary btn-block" type="button" id="add"        onclick="add()">Append 1,000 rows</button></div>
          <div class="col-sm-6 smallpadding"><button class="btn btn-primary btn-block" type="button" id="update"     onclick="update()">Update every 10th row</button></div>
          <div class="col-sm-6 smallpadding"><button class="btn btn-primary btn-block" type="button" id="clear"      onclick="clear()">Clear</button></div>
          <div class="col-sm-6 smallpadding"><button class="btn btn-primary btn-block" type="button" id="swaprows"   onclick="swapRows()">Swap rows</button></div>
        </div>
      </div>
    </div></div>
    <table class="table table-hover table-striped test-data">
      <tbody id="tbody"></tbody>
    </table>
    <span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>
  </div>

  <script type="module">
    import { Real, State } from './AriannA.ts';

    // ── Data helpers ──────────────────────────────────────────────────────────
    const adjectives = ['pretty','large','big','small','tall','short','long','handsome',
      'plain','quaint','clean','elegant','easy','angry','crazy','helpful','mushy','odd',
      'unsightly','adorable','important','inexpensive','cheap','expensive','fancy'];

    const colours = ['red','yellow','blue','green','pink','brown','purple','brown',
      'white','black','orange'];

    const nouns = ['table','chair','house','bbq','desk','car','pony','cookie','sandwich',
      'burger','pizza','mouse','keyboard'];

    let idCounter = 1;

    function rand(max) { return Math.round(Math.random() * 1000) % max; }

    function buildData(count) {
      const data = [];
      for (let i = 0; i < count; i++) {
        data.push({
          id    : idCounter++,
          label : `${adjectives[rand(adjectives.length)]} ${colours[rand(colours.length)]} ${nouns[rand(nouns.length)]}`,
        });
      }
      return data;
    }

    // ── State ─────────────────────────────────────────────────────────────────
    const state = new State({ rows: [], selected: null });
    const tbody = document.getElementById('tbody');

    // ── Render ────────────────────────────────────────────────────────────────
    function renderRows() {
      tbody.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const row of state.State.rows) {
        const tr = document.createElement('tr');
        if (row.id === state.State.selected) tr.className = 'danger';

        const td1 = document.createElement('td');
        td1.className = 'col-md-1';
        td1.textContent = row.id;

        const td2 = document.createElement('td');
        td2.className = 'col-md-4';
        const a = document.createElement('a');
        a.textContent = row.label;
        a.addEventListener('click', () => select(row.id));
        td2.appendChild(a);

        const td3 = document.createElement('td');
        td3.className = 'col-md-1';
        const del = document.createElement('a');
        del.innerHTML = '<span class="glyphicon glyphicon-remove" aria-hidden="true"></span>';
        del.addEventListener('click', () => remove(row.id));
        td3.appendChild(del);

        const td4 = document.createElement('td');
        td4.className = 'col-md-6';

        tr.appendChild(td1);
        tr.appendChild(td2);
        tr.appendChild(td3);
        tr.appendChild(td4);
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);
    }

    // ── Operations (the 9 standard benchmark ops) ─────────────────────────────

    // 1. Create 1,000 rows
    window.run = function() {
      state.State.rows     = buildData(1000);
      state.State.selected = null;
      renderRows();
    };

    // 7. Create 10,000 rows
    window.runLots = function() {
      state.State.rows     = buildData(10000);
      state.State.selected = null;
      renderRows();
    };

    // 8. Append 1,000 rows
    window.add = function() {
      state.State.rows = state.State.rows.concat(buildData(1000));
      renderRows();
    };

    // 3. Update every 10th row
    window.update = function() {
      const rows = state.State.rows;
      for (let i = 0; i < rows.length; i += 10) {
        rows[i].label += ' !!!';
      }
      renderRows();
    };

    // 9. Clear
    window.clear = function() {
      state.State.rows     = [];
      state.State.selected = null;
      tbody.innerHTML      = '';
    };

    // 5. Swap rows 1 and 998
    window.swapRows = function() {
      const rows = state.State.rows;
      if (rows.length >= 999) {
        [rows[1], rows[998]] = [rows[998], rows[1]];
        renderRows();
      }
    };

    // 4. Select a row
    function select(id) {
      state.State.selected = id;
      renderRows();
    }

    // 6. Remove a row
    function remove(id) {
      state.State.rows = state.State.rows.filter(r => r.id !== id);
      renderRows();
    }

  </script>
</body>
</html>
